# Docker Compose 配置 - 本地 MongoDB 版本
# 适用于无法访问 Docker Hub 的环境
# 需要先在宿主机安装 MongoDB

x-common-config:
  &common-config
  restart: always
  networks:
    mbti-network:
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  backend:
    <<: *common-config
    tty: true
    stdin_open: true
    build:
      context: ./mbti-backend
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      # 使用宿主机 MongoDB (host.docker.internal 是 Docker 访问宿主机的特殊 DNS)
      - MONGODB_URI=mongodb://host.docker.internal:27017/mbti_test
      - NODE_OPTIONS=--max-old-space-size=512
    volumes:
      - ./mbti-backend:/app
      - ./docker-import.js:/app/docker-import.js
      - ./import-data-complete.json:/app/data/import-data-complete.json
      - ./simple-import.js:/app/simple-import.js
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"
        reservations:
          cpus: "0.5"
          memory: "512M"
    # 使用 host 网络模式访问宿主机 MongoDB
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    <<: *common-config
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    volumes:
      - ./mbti-frontend:/app/mbti-frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.6"
          memory: "512M"
        reservations:
          cpus: "0.2"
          memory: "256M"

networks:
  mbti-network:
    driver: bridge
